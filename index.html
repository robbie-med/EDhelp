<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ED50 — Emergency Department Clinical Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111419;
    --surface2: #181c24;
    --border: #1e2430;
    --border-bright: #2a3040;
    --text: #d4dbe8;
    --muted: #6b7a94;
    --dim: #3a4558;
    --accent: #e8b84b;
    --accent-dim: #a07e2a;
    --red: #e05252;
    --red-dim: #6b2222;
    --green: #4caf7d;
    --blue: #4a90d9;
    --blue-dim: #1e3a5c;
    --cat-cardiac: #e05252;
    --cat-pulm: #4a90d9;
    --cat-gi: #d4845a;
    --cat-neuro: #9b72cf;
    --cat-renal: #4caf7d;
    --cat-id: #e8b84b;
    --cat-msk: #4ac9b0;
    --cat-endo: #cf72a0;
    --cat-tox: #72cf88;
    --cat-trauma: #cf9f72;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Sora’, sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
overflow-x: hidden;
}

header {
position: sticky; top: 0; z-index: 100;
background: rgba(10,12,16,0.97);
border-bottom: 1px solid var(--border);
padding: 0 1.5rem;
display: flex; align-items: center; gap: 1.25rem;
height: 54px; backdrop-filter: blur(12px);
}

.logo {
font-family: ‘JetBrains Mono’, monospace;
font-size: 1.05rem; font-weight: 700;
color: var(--accent); letter-spacing: 0.04em;
white-space: nowrap; flex-shrink: 0; line-height: 1;
}
.logo em { font-style: normal; color: var(--muted); font-size: 0.65rem; display: block; letter-spacing: 0.1em; margin-top: 2px; }

.search-wrap { flex: 1; max-width: 460px; position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
#search {
width: 100%; background: var(--surface); border: 1px solid var(--border);
border-radius: 6px; padding: 8px 12px 8px 32px;
color: var(--text); font-family: ‘Sora’, sans-serif; font-size: 0.83rem;
outline: none; transition: border-color 0.15s;
}
#search::placeholder { color: var(--dim); }
#search:focus { border-color: var(--accent-dim); }

#count-display { margin-left: auto; font-family: ‘JetBrains Mono’, monospace; font-size: 0.68rem; color: var(--muted); flex-shrink: 0; }

.layout { display: flex; min-height: calc(100vh - 54px); }

.sidebar {
width: 210px; flex-shrink: 0;
border-right: 1px solid var(--border);
padding: 0.75rem 0;
position: sticky; top: 54px;
height: calc(100vh - 54px); overflow-y: auto;
}
.sidebar-label { font-family: ‘JetBrains Mono’, monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--dim); padding: 0 1rem 0.5rem; text-transform: uppercase; }
.cat-btn {
display: flex; align-items: center; gap: 8px;
width: 100%; padding: 6px 1rem;
background: none; border: none; cursor: pointer;
text-align: left; font-family: ‘Sora’, sans-serif;
font-size: 0.78rem; color: var(--muted);
transition: all 0.12s; border-left: 2px solid transparent;
}
.cat-btn:hover { color: var(--text); background: var(--surface); }
.cat-btn.active { color: var(--text); background: var(--surface); border-left-color: var(--accent); }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-count { margin-left: auto; font-family: ‘JetBrains Mono’, monospace; font-size: 0.63rem; color: var(--dim); }

main { flex: 1; padding: 1.25rem; overflow-y: auto; }

#card-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
gap: 1px; background: var(--border);
border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}

.card {
background: var(--surface); padding: 1rem 1.1rem;
cursor: pointer; transition: background 0.1s;
border-left: 3px solid transparent;
}
.card:hover { background: var(--surface2); }
.card.open { background: var(--surface2); }

.card-header { display: flex; align-items: flex-start; gap: 0.5rem; }
.card-num { font-family: ‘JetBrains Mono’, monospace; font-size: 0.6rem; color: var(--dim); margin-top: 2px; flex-shrink: 0; width: 18px; }
.card-title-block { flex: 1; }
.card-title { font-size: 0.88rem; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-subtitle { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.card-tag { font-size: 0.6rem; font-family: ‘JetBrains Mono’, monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; }
.card-chevron { color: var(--dim); font-size: 0.72rem; margin-left: 3px; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
.card.open .card-chevron { transform: rotate(180deg); color: var(--accent); }

.card-body { display: none; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

.section { margin-bottom: 0.8rem; }
.section-label { font-family: ‘JetBrains Mono’, monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 0.35rem; }
.section ul { list-style: none; display: flex; flex-direction: column; gap: 3px; }
.section ul li { font-size: 0.76rem; color: var(--text); padding-left: 0.85rem; position: relative; line-height: 1.4; }
.section ul li::before { content: ‘›’; position: absolute; left: 0; color: var(--accent); }

/* Red flags box */
.alert-box {
background: rgba(224,82,82,0.07); border: 1px solid var(--red-dim);
border-radius: 4px; padding: 0.55rem 0.7rem; margin-bottom: 0.8rem;
}
.alert-box .alert-head { font-family: ‘JetBrains Mono’, monospace; font-size: 0.6rem; letter-spacing: 0.08em; color: var(--red); margin-bottom: 0.3rem; }
.alert-box ul { list-style: none; }
.alert-box ul li { font-size: 0.73rem; color: #d98080; padding-left: 0.85rem; position: relative; line-height: 1.4; margin-bottom: 2px; }
.alert-box ul li::before { content: ‘!’; position: absolute; left: 0; color: var(--red); font-weight: 700; }

/* Meds table */
.meds-section { margin-bottom: 0.8rem; }
.meds-section .section-label { color: #4a90d9; margin-bottom: 0; }
.meds-table { width: 100%; border-collapse: collapse; margin-top: 0.35rem; font-size: 0.71rem; }
.meds-table thead tr { background: rgba(74,144,217,0.1); }
.meds-table th {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase;
color: var(--blue); padding: 5px 7px; text-align: left;
border-bottom: 1px solid var(--blue-dim);
}
.meds-table td {
padding: 5px 7px; border-bottom: 1px solid var(--border);
vertical-align: top; line-height: 1.38;
}
.meds-table tr:last-child td { border-bottom: none; }
.meds-table tr:hover td { background: rgba(255,255,255,0.02); }
.meds-table .drug { font-family: ‘JetBrains Mono’, monospace; color: #7eb8e8; font-size: 0.7rem; font-weight: 600; }
.meds-table .dose { color: #c8daf0; }
.meds-table .route { font-family: ‘JetBrains Mono’, monospace; font-size: 0.63rem; }
.route-iv { color: #e05252; }
.route-im { color: #d4845a; }
.route-po { color: #4caf7d; }
.route-sq { color: #9b72cf; }
.route-in { color: #4ac9b0; }
.route-neb { color: #4a90d9; }
.route-top { color: #cf9f72; }
.meds-table .ci { color: #b08060; font-size: 0.67rem; font-style: italic; }

/* Intern tip */
.intern-tip {
background: rgba(232,184,75,0.07); border: 1px solid var(--accent-dim);
border-left: 3px solid var(--accent); border-radius: 4px;
padding: 0.55rem 0.7rem; font-size: 0.74rem; color: #cdb870; line-height: 1.5;
}
.intern-tip strong { font-family: ‘JetBrains Mono’, monospace; font-size: 0.6rem; letter-spacing: 0.06em; color: var(--accent); display: block; margin-bottom: 0.2rem; }

.no-results { grid-column: 1/-1; padding: 3rem; text-align: center; color: var(--dim); font-size: 0.85rem; font-family: ‘JetBrains Mono’, monospace; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

@media (max-width: 768px) {
.sidebar { display: none; }
#card-grid { grid-template-columns: 1fr; }
.logo em { display: none; }
}
</style>

</head>
<body>

<header>
  <div class="logo">ED50<em>EMERGENCY MEDICINE — INTERN REFERENCE</em></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search conditions, drugs, doses, symptoms…" autocomplete="off" spellcheck="false">
  </div>
  <span id="count-display">50 conditions</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Categories</div>
    <button class="cat-btn active" data-cat="all"><span class="cat-dot" style="background:var(--muted)"></span>All<span class="cat-count" id="cnt-all">50</span></button>
    <button class="cat-btn" data-cat="Cardiac"><span class="cat-dot" style="background:var(--cat-cardiac)"></span>Cardiac<span class="cat-count" id="cnt-Cardiac"></span></button>
    <button class="cat-btn" data-cat="Pulmonary"><span class="cat-dot" style="background:var(--cat-pulm)"></span>Pulmonary<span class="cat-count" id="cnt-Pulmonary"></span></button>
    <button class="cat-btn" data-cat="Neuro"><span class="cat-dot" style="background:var(--cat-neuro)"></span>Neuro<span class="cat-count" id="cnt-Neuro"></span></button>
    <button class="cat-btn" data-cat="GI"><span class="cat-dot" style="background:var(--cat-gi)"></span>GI / Abdominal<span class="cat-count" id="cnt-GI"></span></button>
    <button class="cat-btn" data-cat="Renal"><span class="cat-dot" style="background:var(--cat-renal)"></span>Renal / Fluids<span class="cat-count" id="cnt-Renal"></span></button>
    <button class="cat-btn" data-cat="ID"><span class="cat-dot" style="background:var(--cat-id)"></span>Infectious Disease<span class="cat-count" id="cnt-ID"></span></button>
    <button class="cat-btn" data-cat="MSK"><span class="cat-dot" style="background:var(--cat-msk)"></span>MSK / Ortho<span class="cat-count" id="cnt-MSK"></span></button>
    <button class="cat-btn" data-cat="Endo"><span class="cat-dot" style="background:var(--cat-endo)"></span>Endocrine<span class="cat-count" id="cnt-Endo"></span></button>
    <button class="cat-btn" data-cat="Tox"><span class="cat-dot" style="background:var(--cat-tox)"></span>Toxicology<span class="cat-count" id="cnt-Tox"></span></button>
    <button class="cat-btn" data-cat="Trauma"><span class="cat-dot" style="background:var(--cat-trauma)"></span>Trauma / Other<span class="cat-count" id="cnt-Trauma"></span></button>
  </aside>

  <main><div id="card-grid"></div></main>
</div>

<script>
const CAT_COLORS = { Cardiac:'var(--cat-cardiac)', Pulmonary:'var(--cat-pulm)', GI:'var(--cat-gi)', Neuro:'var(--cat-neuro)', Renal:'var(--cat-renal)', ID:'var(--cat-id)', MSK:'var(--cat-msk)', Endo:'var(--cat-endo)', Tox:'var(--cat-tox)', Trauma:'var(--cat-trauma)' };

// meds: [{drug, dose, route, ci}]
// route codes: IV, IM, PO, SQ, IN, NEB, TOP, IO, PR, SL

const CONDITIONS = [
{
  id:1, title:"ACS / STEMI", cat:"Cardiac",
  subtitle:"Acute coronary syndrome — rule out every chest pain",
  workup:["12-lead EKG within 10 min (door-to-balloon <90 min STEMI goal)","hs-Troponin 0h + 1-3h; negative serial = high NPV for NSTEMI","CXR, BMP, CBC, coags, lipid panel, type & screen","Continuous cardiac monitor, pulse ox, large-bore IV ×2","Right-sided EKG (V4R) for inferior STEMI to rule out RV infarct"],
  redflags:["STE ≥1mm in ≥2 contiguous leads → activate cath lab NOW","New LBBB or posterior MI (ST depression V1-V3 + tall R) = STEMI equivalent","Hemodynamic instability → cardiogenic shock → IABP/Impella/emergent cath","RV infarct + nitrates → cardiovascular collapse (hold nitrates if RV MI)"],
  meds:[
    {drug:"Aspirin",dose:"325 mg × 1 load, then 81 mg daily",route:"PO",ci:"True ASA allergy; chew/crush if unable to swallow"},
    {drug:"Ticagrelor (preferred P2Y12)",dose:"180 mg × 1 load",route:"PO",ci:"Prior ICH, active bleeding, severe hepatic impairment, CrCl <15"},
    {drug:"Clopidogrel (alt P2Y12)",dose:"600 mg × 1 load (STEMI); 300 mg if >75yo",route:"PO",ci:"Active pathological bleeding; less potent than ticagrelor"},
    {drug:"Heparin UFH (STEMI)",dose:"60 units/kg IV bolus (max 4000 units) → 12 units/kg/hr (max 1000 units/hr); titrate PTT 50-70 sec",route:"IV",ci:"Active bleeding, HIT"},
    {drug:"Enoxaparin (NSTEMI/UA)",dose:"1 mg/kg SQ q12h; reduce to 1 mg/kg q24h if CrCl <30; avoid if CrCl <15",route:"SQ",ci:"CrCl <15, HIT, active bleeding"},
    {drug:"Nitroglycerin",dose:"0.4 mg SL q5 min ×3, then 5-10 mcg/min IV drip; titrate by 5 mcg/min q3-5 min",route:"SL / IV",ci:"SBP <90, RV infarct, PDE5 inhibitor ≤24-48h, severe aortic stenosis"},
    {drug:"Morphine",dose:"2-4 mg IV q5-15 min PRN (use cautiously — may worsen outcomes in NSTEMI)",route:"IV",ci:"Hypotension, respiratory depression; MORPHINE-3 trial showed harm signal in NSTEMI"}
  ],
  tip:"HEART score ≥4 = admit. HEART 0-3 + negative serial hs-troponins at 0 and 1-2h = safe discharge with outpatient follow-up. Inferior STEMI (II/III/aVF): always right-sided EKG before nitrates — RV infarct is preload-dependent and nitrates can drop BP catastrophically."
},
{
  id:2, title:"Acute HF / Pulmonary Edema", cat:"Cardiac",
  subtitle:"Decompensated heart failure — warm/wet vs cold/wet",
  workup:["BNP >500 strongly suggests HF; <100 effectively rules it out","CXR: vascular congestion, Kerley B lines, bat-wing edema, pleural effusions","BMP, CBC, troponin, EKG, bedside echo (EF? IVC? wall motion?)","Foley — urine output is your primary response metric; target >0.5 mL/kg/hr"],
  redflags:["Cold + wet (cardiogenic shock) → inotropes, NOT more diuretics; recognize by cold skin, narrow pulse pressure, rising lactate","Respiratory failure → BiPAP immediately; RSI if cannot protect airway","New harsh murmur post-MI → acute MR or VSD → surgical emergency"],
  meds:[
    {drug:"Furosemide (Lasix)",dose:"If diuretic-naive: 40 mg IV push; if on home furosemide: 1-2.5× home PO dose as single IV bolus (e.g., home 40 mg PO → 40-100 mg IV)",route:"IV",ci:"Anuria, allergy; sulfa cross-reactivity rare but document"},
    {drug:"Nitroglycerin",dose:"Start 5-10 mcg/min IV; titrate by 5-10 mcg/min q3-5 min (max 200 mcg/min); or 0.4 mg SL q5 min ×3 for rapid onset",route:"IV / SL",ci:"SBP <90, RV failure, PDE5 inhibitor use; headache/hypotension common — keep 250 mL NS at bedside"},
    {drug:"BiPAP (NIV)",dose:"IPAP 10-12 cmH₂O, EPAP 5 cmH₂O; titrate IPAP up to 20 for severe hypoxia",route:"Mask",ci:"Unable to protect airway, AMS, vomiting, hemodynamic collapse"},
    {drug:"Dobutamine",dose:"2-20 mcg/kg/min IV infusion (cardiogenic shock with low CO)",route:"IV",ci:"Tachyarrhythmias are common dose-limiting side effect; avoid as sole agent if SBP <80"},
    {drug:"Norepinephrine",dose:"0.1-0.5 mcg/kg/min IV; titrate to MAP ≥65 mmHg",route:"IV",ci:"Requires central line or large proximal IV for prolonged use; use alongside dobutamine in cardiogenic shock"},
    {drug:"Morphine",dose:"2-4 mg IV q4-6h PRN severe dyspnea",route:"IV",ci:"Controversial — may worsen outcomes; reserve for air hunger unresponsive to other Rx"}
  ],
  tip:"Warm and wet = diurese + vasodilate. Cold and wet (cardiogenic shock) looks 'normal' because vasoconstriction keeps BP up — feel the extremities. Cold hands + narrow pulse pressure + rising lactate = get inotropes going. These patients die if you give them more Lasix."
},
{
  id:3, title:"Atrial Fibrillation", cat:"Cardiac",
  subtitle:"Rate vs rhythm — the central ED decision",
  workup:["12-lead EKG: irregularly irregular, absent P waves, variable RR","BMP (K+, Mg2+ — electrolytes drive AF), CBC, TSH (new AF), troponin","Bedside echo: EF, valvular disease, thrombus; CHA₂DS₂-VASc for anticoag decision","Assess hemodynamic stability — determines entire management strategy"],
  redflags:["HR >150 + hypotension/AMS/ischemia/pulmonary edema → UNSTABLE → sync cardioversion 120-200J after sedation, no delay","WPW pattern (wide complex, irregular, delta waves) → AVOID all AV nodal blockers → Procainamide only","New AF in sepsis/PE/ACS → treat the underlying cause first"],
  meds:[
    {drug:"Metoprolol tartrate (rate control)",dose:"5 mg IV slow push over 5 min; repeat q5 min × 3 (max 15 mg IV); switch to 25-50 mg PO BID after rate controlled",route:"IV → PO",ci:"Decompensated HFrEF, cardiogenic shock, severe bronchospasm, 2nd/3rd degree block, HR <60, WPW"},
    {drug:"Diltiazem (rate control)",dose:"0.25 mg/kg IV over 2 min (avg 15-25 mg); if insufficient after 15 min → 0.35 mg/kg IV; then drip 5-15 mg/hr",route:"IV",ci:"HFrEF (EF <40%), WPW, hypotension, severe AS; preferred over metoprolol in bronchospasm"},
    {drug:"Procainamide (WPW or rhythm control)",dose:"15-17 mg/kg IV over 30-60 min (1g over ~60 min); then 1-4 mg/min maintenance",route:"IV",ci:"QTc prolongation, complete heart block, hypotension — monitor BP closely during infusion"},
    {drug:"Ibutilide (chemical cardioversion)",dose:"1 mg IV over 10 min; may repeat × 1 after 10 min",route:"IV",ci:"QTc >440 ms, hypokalemia, structural heart disease with QT concerns; observe 4h post-dose for TdP, have defibrillator at bedside"},
    {drug:"Amiodarone (rate + rhythm control)",dose:"150 mg IV over 10 min → 1 mg/min × 6h → 0.5 mg/min × 18h",route:"IV",ci:"Thyroid disease (relative), lung disease (relative), bradycardia, heart block; multiple drug interactions"},
    {drug:"Heparin UFH (anticoagulation bridge)",dose:"80 units/kg IV bolus → 18 units/kg/hr; adjust per PTT (goal 60-100 sec)",route:"IV",ci:"Active bleeding, HIT"},
    {drug:"Sedation for cardioversion",dose:"Propofol 0.5-1.5 mg/kg IV, or Midazolam 1-2 mg IV + Fentanyl 1 mcg/kg IV",route:"IV",ci:"Airway not secured — have RSI meds ready"}
  ],
  tip:"Before any antiarrhythmic: K+ >4.0 and Mg2+ >2.0. Hypokalemia perpetuates AF and dramatically increases TdP risk. For HFrEF: diltiazem and verapamil are negative inotropes — use metoprolol or digoxin for rate control."
},
{
  id:4, title:"SVT", cat:"Cardiac",
  subtitle:"Narrow-complex tachycardia — usually AVNRT",
  workup:["12-lead EKG: narrow QRS <120ms, pseudo-S in II or pseudo-R in V1, abrupt onset","Assess hemodynamics — determines stable vs unstable pathway","Rule out sinus tachycardia (gradual onset), AF (irregular), flutter (sawtooth, rate ~300)"],
  redflags:["Wide complex → treat as VT until proven otherwise; do NOT give adenosine empirically to wide complex","Unstable (SBP <90, AMS, ischemia) → sync cardioversion 50-100J immediately after sedation"],
  meds:[
    {drug:"Modified Valsalva (REVERT)",dose:"Strain for 15 sec, immediately supine + legs raised 45° for 15 sec — do FIRST",route:"Maneuver",ci:"None; conversion rate ~43%"},
    {drug:"Adenosine",dose:"6 mg rapid IV push (antecubital or larger vein) + flush immediately with 20 mL NS rapid push; if no conversion in 1-2 min → 12 mg IV; may repeat 12 mg × 1",route:"IV",ci:"2nd/3rd degree AV block without pacemaker, sick sinus syndrome, severe reactive airway disease, WPW with pre-excited AF; warn patient of 10-15 sec of chest discomfort/doom"},
    {drug:"Metoprolol (if adenosine fails)",dose:"5 mg IV over 5 min; may repeat × 2",route:"IV",ci:"Cardiogenic shock, severe bronchospasm, WPW"},
    {drug:"Diltiazem (if adenosine fails)",dose:"0.25 mg/kg IV over 2 min",route:"IV",ci:"HFrEF, WPW, hypotension"},
    {drug:"Synchronized cardioversion",dose:"50-100J biphasic; sedate first: Midazolam 1-2 mg IV + Fentanyl 1 mcg/kg IV",route:"IV + pads",ci:"Adequate sedation required; confirm sync mode"}
  ],
  tip:"Modified Valsalva (REVERT trial): 43% conversion rate vs 17% standard — do it before adenosine every time. Adenosine must be injected FAST at a large vein — it degrades in blood in seconds. Center line or antecubital + rapid flush. Warn the patient: 'You'll feel terrible for 15 seconds, then fine.'"
},
{
  id:5, title:"Aortic Dissection", cat:"Cardiac",
  subtitle:"Tearing chest pain + BP differential — surgical emergency if Type A",
  workup:["CTA chest/abdomen/pelvis with IV contrast — gold standard","BP both arms simultaneously (>20 mmHg difference is significant)","CXR: widened mediastinum, irregular aortic knob (only 60-90% sensitive)","D-dimer negative LR 0.07 (useful if low pretest probability only); EKG to exclude ACS"],
  redflags:["Type A (ascending aorta) = call CT surgery NOW — operative mortality 1-2%/hr of delay","Pulse deficit, AI murmur, neurological deficits, tamponade, mesenteric ischemia = complications","NEVER anticoagulate; NEVER thrombolyze — confirm diagnosis before tPA for suspected PE"],
  meds:[
    {drug:"Esmolol (HR control — FIRST LINE)",dose:"500 mcg/kg IV bolus over 1 min → 50-200 mcg/kg/min infusion; titrate to HR <60",route:"IV",ci:"Severe bronchospasm, decompensated HF, bradycardia; preferred because short-acting and titratable"},
    {drug:"Labetalol (HR + BP control)",dose:"20 mg IV over 2 min; repeat 40-80 mg q10 min (max 300 mg total); or 0.5-2 mg/min IV infusion",route:"IV",ci:"Asthma, COPD, decompensated HF, bradycardia"},
    {drug:"Nicardipine (BP — AFTER HR controlled)",dose:"5 mg/hr IV; titrate by 2.5 mg/hr q5-15 min (max 15 mg/hr); target SBP 100-120 mmHg",route:"IV",ci:"Do NOT use vasodilators before HR control — reflex tachycardia worsens shear stress"},
    {drug:"Nitroprusside (BP — if others fail)",dose:"0.3-0.5 mcg/kg/min IV; titrate up; never use alone without beta-blocker",route:"IV",ci:"Renal failure (cyanide accumulation), prolonged use >72h; requires intra-arterial BP monitoring"},
    {drug:"Morphine (analgesia)",dose:"2-4 mg IV q15-30 min PRN — also reduces catecholamine surge",route:"IV",ci:"Hypotension, respiratory depression"}
  ],
  tip:"Rule: HR down FIRST (esmolol), THEN BP down (nicardipine). Vasodilators alone cause reflex tachycardia → worse aortic wall shear stress → propagation. Think of it as: decrease dP/dt (rate of pressure rise) = heart rate × contractility × BP."
},
{
  id:6, title:"Pulmonary Embolism", cat:"Pulmonary",
  subtitle:"Risk stratify with PERC/Wells — massive vs submassive vs low-risk",
  workup:["PERC rule (8 criteria): all met + low pretest prob → no testing","Wells criteria; if ≤4 pts → D-dimer (age-adjusted: age × 10 if >50yo)","CT-PA with IV contrast: gold standard; V/Q scan if contrast allergy or AKI","BNP + troponin for risk stratification; echo (RV dilation, D-sign, McConnell's)"],
  redflags:["Massive PE: SBP <90 for >15 min → systemic thrombolytics immediately","Submassive: normotensive + RV strain (trop rise, BNP rise, RV dilation) → consider CDT vs anticoag alone","Cardiac arrest from PE → tPA 50 mg IV push, continue CPR ×60-90 min"],

// ─── RENDER ─────────────────────────────────────────────────────────────────

const ROUTE_CLASS = {
  IV:'route-iv', IM:'route-im', PO:'route-po', SQ:'route-sq',
  IN:'route-in', NEB:'route-neb', TOP:'route-top', IO:'route-iv',
  PR:'route-po', SL:'route-po', IO:'route-iv'
};

function routeClass(r) {
  const base = r.split('/')[0].trim().split(' ')[0].trim();
  return ROUTE_CLASS[base] || '';
}

function buildCard(cond) {
  const color = CAT_COLORS[cond.cat] || 'var(--muted)';
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = cond.id;
  card.dataset.cat = cond.cat;
  card.style.borderLeftColor = color;

  const tagStyle = `background:${color}22;color:${color};`;

  const medsTable = cond.meds && cond.meds.length ? `
    <div class="meds-section">
      <div class="section-label">MEDICATIONS — DOSE · ROUTE · CONSIDERATIONS</div>
      <table class="meds-table">
        <thead>
          <tr>
            <th>Drug</th>
            <th>Dose</th>
            <th>Route</th>
            <th>Key Considerations / CI</th>
          </tr>
        </thead>
        <tbody>
          ${cond.meds.map(m => `
          <tr>
            <td class="drug">${m.drug}</td>
            <td class="dose">${m.dose}</td>
            <td class="route ${routeClass(m.route)}">${m.route}</td>
            <td class="ci">${m.ci}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <span class="card-num">${String(cond.id).padStart(2,'0')}</span>
      <div class="card-title-block">
        <div class="card-title">${cond.title}</div>
        <div class="card-subtitle">${cond.subtitle}</div>
      </div>
      <span class="card-tag" style="${tagStyle}">${cond.cat}</span>
      <span class="card-chevron">▾</span>
    </div>
    <div class="card-body">
      ${cond.redflags && cond.redflags.length ? `
      <div class="alert-box">
        <div class="alert-head">⚠ RED FLAGS / DON'T MISS</div>
        <ul>${cond.redflags.map(f=>`<li>${f}</li>`).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <div class="section-label">Workup</div>
        <ul>${cond.workup.map(w=>`<li>${w}</li>`).join('')}</ul>
      </div>

      ${medsTable}

      <div class="intern-tip">
        <strong>★ INTERN TIP</strong>
        ${cond.tip}
      </div>
    </div>
  `;

  card.addEventListener('click', e => {
    if (e.target.closest('.card-body')) return; // allow text selection inside body
    card.classList.toggle('open');
  });

  return card;
}

// Sidebar counts
const CATS = ['Cardiac','Pulmonary','Neuro','GI','Renal','ID','MSK','Endo','Tox','Trauma'];
CATS.forEach(cat => {
  const el = document.getElementById(`cnt-${cat}`);
  if (el) el.textContent = CONDITIONS.filter(c=>c.cat===cat).length;
});

const grid = document.getElementById('card-grid');
const countDisplay = document.getElementById('count-display');
let activeCategory = 'all';
let searchQuery = '';

function render() {
  grid.innerHTML = '';
  const q = searchQuery.toLowerCase();
  const filtered = CONDITIONS.filter(cond => {
    const catMatch = activeCategory === 'all' || cond.cat === activeCategory;
    const searchText = [
      cond.title, cond.subtitle, cond.cat,
      ...(cond.workup||[]), ...(cond.redflags||[]), cond.tip,
      ...(cond.meds||[]).flatMap(m=>[m.drug,m.dose,m.route,m.ci])
    ].join(' ').toLowerCase();
    return catMatch && (!q || searchText.includes(q));
  });
  countDisplay.textContent = `${filtered.length} condition${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    const e = document.createElement('div');
    e.className = 'no-results'; e.textContent = 'No conditions match.';
    grid.appendChild(e); return;
  }
  filtered.forEach(c => grid.appendChild(buildCard(c)));
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

render();
</script>
